services:
  # ============================================
  # Reverse Proxy
  # ============================================
  traefik:
    image: traefik:v3.6
    container_name: traefik
    restart: unless-stopped
    environment:
      - TRAEFIK_CERTIFICATESRESOLVERS_LETSENCRYPT_ACME_EMAIL=${ACME_EMAIL}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./infra/traefik/traefik.yml:/traefik.yml:ro
      - traefik-certs:/letsencrypt
    networks:
      - traefik-public
    labels:
      # Dashboard accessible at traefik.yankadevlab.tech (protected by basic auth)
      - "traefik.enable=true"
      - "traefik.http.routers.traefik-dashboard.rule=Host(`traefik.yankadevlab.tech`)"
      - "traefik.http.routers.traefik-dashboard.entrypoints=websecure"
      - "traefik.http.routers.traefik-dashboard.tls.certresolver=letsencrypt"
      - "traefik.http.routers.traefik-dashboard.service=api@internal"
      - "traefik.http.routers.traefik-dashboard.middlewares=traefik-auth"
      - "traefik.http.middlewares.traefik-auth.basicauth.users=${TRAEFIK_DASHBOARD_AUTH}"

  # ============================================
  # Shared PostgreSQL DB
  # ============================================
  postgres:
    image: postgres:16-alpine
    container_name: postgres
    restart: unless-stopped
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER"]
      interval: 5s
      timeout: 3s
      retries: 5
    volumes:
      - pg-data:/var/lib/postgresql/data

  # ============================================
  # Auth Service
  # ============================================
  auth:
    build:
      context: ./services/auth
    container_name: auth
    restart: unless-stopped
    environment:
      - DATABASE_URL=postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?sslmode=disable
      - JWT_SECRET=${JWT_SECRET}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - traefik-public
      - internal
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.auth.rule=Host(`auth.yankadevlab.tech`)"
      - "traefik.http.routers.auth.entrypoints=websecure"
      - "traefik.http.routers.auth.tls.certresolver=letsencrypt"
      - "traefik.http.services.auth.loadbalancer.server.port=8080"

  # ============================================
  # Personal CV Website
  # ============================================
  cv-site:
    image: nginx:alpine
    container_name: cv-site
    restart: unless-stopped
    volumes:
      - /var/www/yannicktirand.xyz/public:/usr/share/nginx/html:ro
    networks:
      - traefik-public
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.cv-site.rule=Host(`yannicktirand.xyz`) || Host(`www.yannicktirand.xyz`) || Host(`yannicktirand.fr`) || Host(`www.yannicktirand.fr`) || Host(`yannicktirand.com`) || Host(`www.yannicktirand.com`)"
      - "traefik.http.routers.cv-site.entrypoints=websecure"
      - "traefik.http.routers.cv-site.tls.certresolver=letsencrypt"

networks:
  traefik-public:
    name: traefik-public
  internal:

volumes:
  traefik-certs:
  pg-data:
